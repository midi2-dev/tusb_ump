; tusb_ump — USB MIDI 2.0 device example for RP2040 / RP2350
; Boards: LilyGO T-PicoC3 (display), bare RP2040 Pico, bare RP2350 Pico 2
;
; Build:  pio run -e T-PicoC3-MIDI2
; Flash:  pio run -e T-PicoC3-MIDI2 -t upload
; Serial: pio device monitor
;
; All environments implement the same UMP protocol contract
; as the T-Display-S3 example — any two boards can ping-pong.

[platformio]
default_envs = T-PicoC3-MIDI2
build_dir     = /c/pio/build/tpicoc3
libdeps_dir   = /c/pio/libdeps/tpicoc3

; ── Common base for all RP2040/RP2350 environments ───────────────────────────
[rp2040_base]
platform         = https://github.com/maxgerhardt/platform-raspberrypi.git
framework        = arduino
board_build.core = earlephilhower
monitor_speed    = 115200
build_flags =
    -DUSE_TINYUSB
    -DCFG_TUD_UMP=1
    -DCFG_TUD_UMP_RX_BUFSIZE=512
    -DCFG_TUD_UMP_TX_BUFSIZE=512
    -DCFG_TUD_MIDI=0
    ; Keep USB descriptor callback symbols if --gc-sections is active
    -Wl,-u,tud_descriptor_device_cb
    -Wl,-u,tud_descriptor_configuration_cb
    -Wl,-u,tud_descriptor_string_cb
lib_deps =
    ; tusb_ump library (4 levels up from platformio.ini → repo root)
    symlink://../../../../

; ── T-PicoC3: RP2040 + ESP32-C3, ST7789V 240×135 display ────────────────────
[env:T-PicoC3-MIDI2]
extends    = rp2040_base
board      = rpipico
build_flags =
    ${rp2040_base.build_flags}
    -DHAS_DISPLAY
    -DBOARD_T_PICOC3
lib_deps =
    lovyan03/LovyanGFX @ 1.2.19
    symlink://../../../../

; ── Bare RP2040 Raspberry Pi Pico (no display) ───────────────────────────────
[env:RP-Pico-MIDI2]
extends    = rp2040_base
board      = rpipico
build_flags =
    ${rp2040_base.build_flags}
    -DBOARD_RP_PICO

; ── Bare RP2350 Raspberry Pi Pico 2 (no display) ─────────────────────────────
[env:RP-Pico2-RP2350-MIDI2]
extends    = rp2040_base
board      = rpipico2
build_flags =
    ${rp2040_base.build_flags}
    -DBOARD_RP_PICO2
