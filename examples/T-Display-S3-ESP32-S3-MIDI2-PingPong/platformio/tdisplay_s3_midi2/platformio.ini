; tusb_ump — USB MIDI 2.0 device example for ESP32-S3
; Tested on: LilyGO T-Display-S3 (ST7789, 320x170)
;
; Build:  pio run -e T-Display-S3-MIDI2
; Flash:  pio run -e T-Display-S3-MIDI2 -t upload
; Serial: pio device monitor

[platformio]
default_envs = T-Display-S3-MIDI2
build_dir     = /c/pio/build/tdisplay
libdeps_dir   = /c/pio/libdeps/tdisplay

[env:T-Display-S3-MIDI2]
platform    = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.13/platform-espressif32.zip
board       = lilygo-t-display-s3
framework   = arduino

; Remove board-JSON USB flags (they come first on the command line and
; GCC's first-definition-wins would override our values).
build_unflags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

build_flags =
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DCFG_TUD_UMP=1
    -DCFG_TUD_UMP_RX_BUFSIZE=512
    -DCFG_TUD_UMP_TX_BUFSIZE=512
    -DCONFIG_TINYUSB_MIDI_ENABLED=0
    -DCFG_TUD_MIDI=0
    ; Keep our USB descriptor callback overrides. arduino-esp32 links with
    ; --gc-sections, which would discard our strong-symbol overrides and fall
    ; back to the WEAK esp32-hal-tinyusb.c versions (VID=0x303A, MIDI 1.0 only).
    -Wl,-u,tud_descriptor_device_cb
    -Wl,-u,tud_descriptor_configuration_cb
    -Wl,-u,tud_descriptor_string_cb

lib_deps =
    lovyan03/LovyanGFX @ ^1.1.16
    ; tusb_ump library (4 levels up: src/ -> device/ -> platformio/ -> esp32_s3/ -> examples/ -> repo root)
    symlink://../../../../

monitor_speed = 115200
upload_speed  = 921600
